specVersion: v0.1.0
package:
  name: my_project_solana_project
  version: v0.1.0
  url: https://github.com/username/my_project_solana_project-solana-devnet
  description: Substreams module for my_project_solana_project on Solana Devnet

imports:
  solana: https://spkg.io/streamingfast/solana-common-v0.4.0.spkg

protobuf:
  files:
    - mydata.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams/rpc
    - sf/substreams/v1
    - sf/substreams/sink
    - sf/substreams/index
    - sf/substreams/index/v1
    - instructions.proto # sol.instructions.v1 from the v0.2.0 spkg
    - transactions.proto # sol.transactions.v1 from the v0.2.0 spkg
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/substreams.wasm

modules:
 - name: map_my_data
   kind: map
   initialBlock: 280000000 # arbitrary block with some pumpfun data
   inputs:
   - map: solana:blocks_without_votes
   output:
    type: proto:mydata.v1.Transfers
  # For performance, you should use a blockFilter whenever possible
  # see https://substreams.dev/streamingfast/solana-common/latest for details
  #
  # blockFilter:
  #   module: solana:program_ids_without_votes
  #   query:
  #     string: program:6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P

network: solana-mainnet-beta
